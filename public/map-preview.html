<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>The Map — Open Road Guide (hub prototype)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.js"></script>
<style>
  :root{
    --coral:#ff6b5b;--teal:#12b5a0;--yellow:#ffb627;--violet:#7c5cfc;--amber:#f59e0b;
    --ink:#1a1a2e;--muted:#6b7280;--line:#ece9e2;--paper:#faf8f3;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%}
  body{font-family:'Outfit',system-ui,sans-serif;color:var(--ink);background:var(--ink);height:100dvh;overflow:hidden;display:flex;flex-direction:column}

  header{padding:11px 16px 9px;background:var(--ink);color:#fff;flex:0 0 auto;display:flex;align-items:center;justify-content:space-between}
  .brand .eyebrow{font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:#9aa0c0}
  .brand h1{font-family:'Fraunces';font-weight:600;font-size:21px;margin:1px 0 0;letter-spacing:-.01em}
  .count{font-size:11.5px;color:#9aa0c0;text-align:right;line-height:1.3}

  .layers{display:flex;gap:7px;padding:9px 14px 11px;background:var(--ink);overflow-x:auto;flex:0 0 auto;scrollbar-width:none}
  .layers::-webkit-scrollbar{display:none}
  .toggle{flex:0 0 auto;display:flex;align-items:center;gap:7px;border-radius:999px;padding:7px 13px 7px 10px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);color:#cdd0e0;transition:all .15s}
  .toggle[aria-pressed="true"]{background:#fff;color:var(--ink);border-color:#fff}
  .sw{width:14px;height:14px;border-radius:50%;flex:0 0 auto}
  .sw.line{width:16px;height:4px;border-radius:2px}
  .sw.area{width:14px;height:14px;border-radius:4px}
  .sw.dash{width:16px;height:0;border-top:3px dashed var(--violet)}

  #map{flex:1 1 auto;width:100%}
  .maplibregl-popup{display:none}

  /* doorway bottom sheet */
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:30;transform:translateY(110%);transition:transform .28s cubic-bezier(.3,.8,.3,1);padding:0 10px 10px}
  .sheet.open{transform:translateY(0)}
  .sheet-card{max-width:680px;margin:0 auto;background:#fff;border-radius:20px 20px 16px 16px;box-shadow:0 -10px 40px rgba(0,0,0,.28);padding:16px 18px 18px;position:relative}
  .grab{width:38px;height:4px;border-radius:2px;background:#e2ddd2;margin:2px auto 12px}
  .sheet-close{position:absolute;top:13px;right:14px;width:30px;height:30px;border:none;border-radius:50%;background:#f3f0e8;color:#6b7280;font-size:17px;cursor:pointer;line-height:1}
  .sheet-type{display:flex;align-items:center;gap:7px;font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
  .sheet h2{font-family:'Fraunces';font-weight:600;font-size:21px;margin:6px 0 3px;line-height:1.12;padding-right:30px}
  .sheet .meta{font-size:12.5px;color:var(--muted);margin-bottom:9px}
  .sheet p{font-size:14px;line-height:1.5;color:#3c4256;margin:0 0 14px}
  .connects{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 14px}
  .cchip{font-size:12px;background:#f6f3ec;border:1px solid var(--line);border-radius:999px;padding:5px 10px;display:flex;align-items:center;gap:6px}
  .cchip .d{width:8px;height:8px;border-radius:50%}
  .door{display:inline-flex;align-items:center;gap:7px;background:var(--ink);color:#fff;text-decoration:none;font-weight:600;font-size:14px;border-radius:12px;padding:12px 16px;width:100%;justify-content:center}

  .hint{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:20;background:rgba(26,26,46,.86);color:#fff;font-size:12.5px;padding:8px 14px;border-radius:999px;backdrop-filter:blur(6px);transition:opacity .3s;pointer-events:none}
</style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="eyebrow">Open Road Guide</div>
      <h1>The Map</h1>
    </div>
    <div class="count" id="count"></div>
  </header>

  <div class="layers" id="layers">
    <button class="toggle" data-layer="pois" aria-pressed="true"><span class="sw" style="background:var(--coral)"></span>Places</button>
    <button class="toggle" data-layer="routes" aria-pressed="true"><span class="sw line" style="background:var(--coral)"></span>Routes</button>
    <button class="toggle" data-layer="regions" aria-pressed="false"><span class="sw area" style="background:rgba(124,92,252,.35);border:1px solid var(--violet)"></span>Regions</button>
    <button class="toggle" data-layer="stories" aria-pressed="false"><span class="sw dash"></span>Stories</button>
  </div>

  <div id="map"></div>

  <div class="hint" id="hint">Tap any pin, road, area, or story arc to open its page</div>

  <div class="sheet" id="sheet">
    <div class="sheet-card">
      <div class="grab"></div>
      <button class="sheet-close" id="sheetClose">×</button>
      <div class="sheet-type" id="sType"></div>
      <h2 id="sName"></h2>
      <div class="meta" id="sMeta"></div>
      <p id="sBody"></p>
      <div class="connects" id="sConnects"></div>
      <a class="door" id="sDoor" href="#">Open the page →</a>
    </div>
  </div>

<script>
const CAT={geological:'#ff6b5b',natural:'#12b5a0',historical:'#ffb627',cultural:'#7c5cfc',attraction:'#ff8a7d',recreational:'#12b5a0',architectural:'#7c5cfc',culinary:'#f59e0b',industrial:'#6b7280',roadside:'#ff6b5b'};
const EMOJI={geological:'🏜️',natural:'🌲',historical:'🏛️',cultural:'🎭',attraction:'⭐',recreational:'🏕️',architectural:'🏗️',culinary:'🍽️',industrial:'🏭',roadside:'🛣️'};
const catColor=c=>CAT[c]||'#ff6b5b';
const cap=s=>s?s[0].toUpperCase()+s.slice(1):'';

// ---- Sample data (real-ish Utah coordinates; prototype copy) ----
const POIS=[
  ['Dewey Bridge','historical','dewey-bridge',-109.3041,38.8119,'Utah’s longest suspension bridge when it opened in 1916 — the crossing that retired the ferryman.'],
  ['Fisher Towers','geological','fisher-towers',-109.3070,38.7261,'Cutler sandstone weathered into blood-red spires that taught climbers a new vocabulary of fear.'],
  ['Castle Valley','geological','castle-valley',-109.4082,38.6394,'Ranchland under the watch of Castle Rock and the Priest and Nuns.'],
  ['Delicate Arch','geological','delicate-arch',-109.4993,38.7436,'The one on the license plate — and the three-mile walk that sorts the curious from the committed.'],
  ['Arches National Park','geological','arches-national-park',-109.6193,38.6168,'Two thousand catalogued arches in a single concentrated stretch of slickrock.'],
  ['Dead Horse Point','natural','dead-horse-point',-109.7407,38.4819,'Two thousand feet above a gooseneck of the Colorado, on a mesa once used as a natural corral.'],
  ['Moab','cultural','moab',-109.5498,38.5733,'Uranium boom, river town, trailhead to two national parks — the improbable hub of canyon country.'],
  ['Logan Canyon','natural','logan-canyon',-111.7799,41.7558,'A limestone canyon the river spent ages carving, climbing valley floor to alpine pass.'],
  ['Tony Grove Lake','natural','tony-grove-lake',-111.6386,41.8939,'A glacial cirque lake ringed with wildflowers at eight thousand feet.'],
  ['Bear Lake Overlook','natural','bear-lake-overlook',-111.4063,41.9477,'First sight of the lake’s improbable Caribbean blue — a trick of suspended limestone.'],
  ['Capitol Reef','geological','capitol-reef',-111.2615,38.2920,'The way into the Waterpocket Fold, a hundred-mile wrinkle early travelers read as a reef.'],
  ['Goblin Valley','geological','goblin-valley',-110.7079,38.5644,'A basin of hoodoos the size of people, Entrada sandstone caught mid-melt.'],
  ['Fruita','historical','fruita-historic-district',-111.2460,38.2870,'Pioneer orchards still bearing fruit beside the river — pick your own in season.'],
  ['Zion Canyon','geological','zion-canyon',-113.0263,37.2982,'Navajo sandstone walls so sheer the road runs the canyon floor between them.'],
  ['Bryce Canyon','geological','bryce-canyon',-112.1871,37.5930,'Not a canyon at all but an amphitheatre of hoodoos, frost-carved row on row.'],
  ['Cedar Breaks','geological','cedar-breaks',-112.8452,37.6306,'A coliseum of eroded rock at ten thousand feet, bristlecones at the rim.'],
  ['Park City','cultural','park-city',-111.4980,40.6461,'Silver-mine boomtown turned ski town, its Main Street still reading 1890s.'],
  ['Mirror Lake','natural','mirror-lake',-110.8771,40.7016,'A high Uinta lake below Bald Mountain, the reward at the top of a scenic climb.'],
  ['Timpanogos Cave','geological','timpanogos-cave',-111.7088,40.4407,'Helictites that grew sideways against gravity, up a steep mile-and-a-half trail.'],
  ['Bonneville Salt Flats','natural','bonneville-salt-flats',-113.8000,40.7600,'Thirty thousand acres of hard white salt — the land-speed record’s home ground.'],
  ['Spiral Jetty','cultural','spiral-jetty',-112.6687,41.4380,'Smithson’s coil of black basalt curling into the pink shallows of the Great Salt Lake.'],
  ['Monument Valley','geological','monument-valley',-110.1097,37.0042,'The buttes that stood in for the whole American West in half the Westerns you remember.'],
  ['Hovenweep','historical','hovenweep',-109.0747,37.3837,'Ancestral Puebloan towers set at the heads of canyons, masonry still squared after centuries.'],
  ['Newspaper Rock','cultural','newspaper-rock',-109.5190,38.0167,'A single panel carrying two thousand years of petroglyphs, layered hand over hand.']
];
const poiBySlug={};
POIS.forEach(p=>poiBySlug[p[2]]={name:p[0],cat:p[1],lng:p[3],lat:p[4]});

const ROUTES=[
  ['UT-128 Colorado River Road','ut-128-colorado-river-road',44,'The river corridor from Moab to Dewey Bridge — red walls that have stood in for the Old West on film for a century.',
    [[-109.5498,38.5733],[-109.49,38.62],[-109.46,38.66],[-109.41,38.69],[-109.36,38.74],[-109.33,38.78],[-109.3041,38.8119]]],
  ['Logan Canyon Scenic Byway','logan-canyon-byway',41,'Valley floor to alpine pass through limestone, ending at Bear Lake’s impossible blue.',
    [[-111.835,41.735],[-111.78,41.755],[-111.70,41.80],[-111.63,41.86],[-111.53,41.92],[-111.4063,41.9477]]],
  ['Highway 24 · Capitol Reef','ut-24-capitol-reef',30,'The cut straight through the Waterpocket Fold, the Fremont River as your guide.',
    [[-111.40,38.30],[-111.30,38.29],[-111.2615,38.2920],[-111.18,38.30],[-111.05,38.32]]],
  ['Mirror Lake Highway','mirror-lake-highway',42,'A climb into the high Uintas past a string of glacial lakes.',
    [[-111.41,40.62],[-111.20,40.66],[-111.00,40.69],[-110.88,40.70],[-110.8771,40.7016]]],
  ['Nine Mile Canyon Backway','nine-mile-canyon-backway',59,'The world’s longest art gallery — a back road dense with rock art and homestead ruins.',
    [[-110.66,39.78],[-110.50,39.74],[-110.35,39.72],[-110.20,39.70],[-110.06,39.68]]]
];

const REGIONS=[
  ['Canyon Country','canyon-country','#ff6b5b','Moab, Arches, Canyonlands — slickrock and the rivers that cut it.',
    [[-110.1,38.15],[-108.9,38.15],[-108.9,39.05],[-110.1,39.05],[-110.1,38.15]]],
  ['Cache Valley & Bear Lake','cache-valley','#12b5a0','Logan’s canyon, the high lakes, and a lake the color of the Caribbean.',
    [[-112.05,41.5],[-111.25,41.5],[-111.25,42.12],[-112.05,42.12],[-112.05,41.5]]],
  ['Capitol Reef & San Rafael','capitol-reef-region','#ffb627','The Waterpocket Fold and the goblin-strewn desert north of it.',
    [[-111.55,37.95],[-110.25,37.95],[-110.25,38.85],[-111.55,38.85],[-111.55,37.95]]],
  ['Color Country','color-country','#7c5cfc','Zion, Bryce, Cedar Breaks — the painted southwest corner.',
    [[-113.35,36.95],[-111.95,36.95],[-111.95,37.85],[-113.35,37.85],[-113.35,36.95]]],
  ['Wasatch Back','wasatch-back','#f59e0b','Park City and the high Uinta lakes within reach of the Wasatch Front.',
    [[-111.65,40.28],[-110.65,40.28],[-110.65,40.88],[-111.65,40.88],[-111.65,40.28]]]
];

const STORIES=[
  ['The Bridges of the Colorado','bridges-of-the-colorado','History','#ff6b5b','How three river crossings — a ferry, a wagon bridge, a highway — rewrote who could reach canyon country, and when.',['dewey-bridge','castle-valley','moab']],
  ['Reading the Waterpocket Fold','waterpocket-fold','Geology','#12b5a0','One buckle in the earth’s crust, read across a hundred miles of orchard, goblin, and cliff.',['capitol-reef','fruita-historic-district','goblin-valley']],
  ['Glacial Water','glacial-water','Nature','#7c5cfc','What the ice left behind in the north — cirque lakes, a carved canyon, and a basin of suspended lime.',['tony-grove-lake','logan-canyon','bear-lake-overlook']],
  ['Ancestral Marks','ancestral-marks','Culture','#ffb627','Reading the people who were here first, from a petroglyph panel to towers built to last.',['newspaper-rock','hovenweep','monument-valley']]
];

document.getElementById('count').innerHTML=`${POIS.length} places · ${ROUTES.length} routes<br>${REGIONS.length} regions · ${STORIES.length} stories`;

// ---- Build GeoJSON ----
const fc=(features)=>({type:'FeatureCollection',features});
const poiFC=fc(POIS.map(p=>({type:'Feature',geometry:{type:'Point',coordinates:[p[3],p[4]]},properties:{name:p[0],cat:p[1],slug:p[2],teaser:p[5],color:catColor(p[1])}})));
const routeFC=fc(ROUTES.map(r=>({type:'Feature',geometry:{type:'LineString',coordinates:r[3]},properties:{name:r[0],slug:r[1],miles:r[2],teaser:r[3]&&''||'',t:r[2]}})));
// fix route props (teaser is index 3? no) -> rebuild cleanly
routeFC.features=ROUTES.map(r=>({type:'Feature',geometry:{type:'LineString',coordinates:r[4]},properties:{name:r[0],slug:r[1],miles:r[2],teaser:r[3]}}));
const regionFC=fc(REGIONS.map(r=>({type:'Feature',geometry:{type:'Polygon',coordinates:[r[4]]},properties:{name:r[0],slug:r[1],color:r[2],teaser:r[3]}})));
const storyArcFC=fc(STORIES.map(s=>({type:'Feature',geometry:{type:'LineString',coordinates:s[5].map(sl=>[poiBySlug[sl].lng,poiBySlug[sl].lat])},properties:{title:s[0],slug:s[1],stype:s[2],color:s[3],teaser:s[4]}})));
const storyPtFeatures=[];
STORIES.forEach(s=>s[5].forEach(sl=>{const p=poiBySlug[sl];storyPtFeatures.push({type:'Feature',geometry:{type:'Point',coordinates:[p.lng,p.lat]},properties:{title:s[0],slug:s[1],stype:s[2],color:s[3],teaser:s[4]}})}));
const storyPtFC=fc(storyPtFeatures);

// ---- Map ----
const map=new maplibregl.Map({
  container:'map',
  style:{version:8,name:'Open Road Guide',
    sources:{'osm':{type:'raster',tiles:['https://a.tile.openstreetmap.org/{z}/{x}/{y}.png','https://b.tile.openstreetmap.org/{z}/{x}/{y}.png','https://c.tile.openstreetmap.org/{z}/{x}/{y}.png'],tileSize:256,attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'}},
    layers:[{id:'osm',type:'raster',source:'osm',minzoom:0,maxzoom:19}]},
  center:[-111.4,39.2],zoom:5.7,attributionControl:true
});
map.addControl(new maplibregl.NavigationControl({showCompass:false}),'top-right');

const vis=v=>v?'visible':'none';
const STATE={pois:true,routes:true,regions:false,stories:false};

map.on('load',()=>{
  // Regions (bottom)
  map.addSource('regions',{type:'geojson',data:regionFC});
  map.addLayer({id:'regions-fill',type:'fill',source:'regions',layout:{visibility:vis(STATE.regions)},paint:{'fill-color':['get','color'],'fill-opacity':0.16}});
  map.addLayer({id:'regions-outline',type:'line',source:'regions',layout:{visibility:vis(STATE.regions)},paint:{'line-color':['get','color'],'line-width':1.5,'line-dasharray':[2,1.5],'line-opacity':0.7}});

  // Routes
  map.addSource('routes',{type:'geojson',data:routeFC});
  map.addLayer({id:'routes-casing',type:'line',source:'routes',layout:{visibility:vis(STATE.routes),'line-cap':'round','line-join':'round'},paint:{'line-color':'#ffffff','line-width':6}});
  map.addLayer({id:'routes-line',type:'line',source:'routes',layout:{visibility:vis(STATE.routes),'line-cap':'round','line-join':'round'},paint:{'line-color':'#ff6b5b','line-width':3.2}});

  // Stories (arcs + rings)
  map.addSource('story-arcs',{type:'geojson',data:storyArcFC});
  map.addLayer({id:'story-arcs',type:'line',source:'story-arcs',layout:{visibility:vis(STATE.stories),'line-cap':'round','line-join':'round'},paint:{'line-color':['get','color'],'line-width':2.4,'line-dasharray':[1.5,1.5],'line-opacity':0.9}});
  map.addSource('story-points',{type:'geojson',data:storyPtFC});
  map.addLayer({id:'story-rings',type:'circle',source:'story-points',layout:{visibility:vis(STATE.stories)},paint:{'circle-radius':12,'circle-color':['get','color'],'circle-opacity':0.14,'circle-stroke-color':['get','color'],'circle-stroke-width':2}});

  // POIs (top)
  map.addSource('pois',{type:'geojson',data:poiFC});
  map.addLayer({id:'pois-layer',type:'circle',source:'pois',layout:{visibility:vis(STATE.pois)},paint:{'circle-radius':6.5,'circle-color':['get','color'],'circle-stroke-color':'#ffffff','circle-stroke-width':2}});

  ['pois-layer','routes-line','regions-fill','story-arcs','story-rings'].forEach(id=>{
    map.on('mouseenter',id,()=>map.getCanvas().style.cursor='pointer');
    map.on('mouseleave',id,()=>map.getCanvas().style.cursor='');
  });
});

// ---- Toggles ----
const groups={pois:['pois-layer'],routes:['routes-casing','routes-line'],regions:['regions-fill','regions-outline'],stories:['story-arcs','story-rings']};
document.getElementById('layers').addEventListener('click',e=>{
  const btn=e.target.closest('.toggle');if(!btn)return;
  const layer=btn.dataset.layer;STATE[layer]=!STATE[layer];
  btn.setAttribute('aria-pressed',String(STATE[layer]));
  groups[layer].forEach(id=>{if(map.getLayer(id))map.setLayoutProperty(id,'visibility',vis(STATE[layer]))});
});

// ---- Doorway sheet ----
const sheet=document.getElementById('sheet');
let hintGone=false;
function openSheet(kind,props){
  if(!hintGone){document.getElementById('hint').style.opacity='0';hintGone=true;}
  const typeEl=document.getElementById('sType'),door=document.getElementById('sDoor'),conn=document.getElementById('sConnects');
  conn.innerHTML='';document.getElementById('sMeta').textContent='';
  if(kind==='poi'){
    const c=props.color;
    typeEl.innerHTML=`<span style="width:9px;height:9px;border-radius:50%;background:${c};display:inline-block"></span><span style="color:${c}">${cap(props.cat)}</span>`;
    document.getElementById('sName').textContent=props.name;
    document.getElementById('sBody').textContent=props.teaser;
    door.textContent='Open the place →';door.href=`/poi/${props.slug}`;
  }else if(kind==='route'){
    typeEl.innerHTML=`<span class="sw line" style="background:#ff6b5b;display:inline-block"></span><span style="color:#ff6b5b">Route</span>`;
    document.getElementById('sName').textContent=props.name;
    document.getElementById('sMeta').textContent=`${props.miles} miles`;
    document.getElementById('sBody').textContent=props.teaser;
    door.textContent='Open the route →';door.href=`/route/${props.slug}`;
  }else if(kind==='region'){
    typeEl.innerHTML=`<span class="sw area" style="background:${props.color}55;border:1px solid ${props.color};display:inline-block"></span><span style="color:${props.color}">Region</span>`;
    document.getElementById('sName').textContent=props.name;
    document.getElementById('sBody').textContent=props.teaser;
    door.textContent='Open the region →';door.href=`/region/${props.slug}`;
  }else if(kind==='story'){
    typeEl.innerHTML=`<span class="sw dash" style="border-top-color:${props.color};display:inline-block"></span><span style="color:${props.color}">${props.stype} · Story</span>`;
    document.getElementById('sName').textContent=props.title;
    document.getElementById('sBody').textContent=props.teaser;
    const s=STORIES.find(x=>x[1]===props.slug);
    if(s){conn.innerHTML='<div style="font-size:11px;color:#6b7280;width:100%;margin-bottom:2px">Connects these places</div>'+s[5].map(sl=>{const p=poiBySlug[sl];return `<span class="cchip"><span class="d" style="background:${catColor(p.cat)}"></span>${p.name}</span>`}).join('');}
    door.textContent='Read the story →';door.href=`/story/${props.slug}`;
  }
  sheet.classList.add('open');
}
document.getElementById('sheetClose').addEventListener('click',()=>sheet.classList.remove('open'));

map.on('click',e=>{
  const order=[['pois-layer','poi'],['story-rings','story'],['story-arcs','story'],['routes-line','route'],['regions-fill','region']];
  for(const [id,kind] of order){
    if(!map.getLayer(id))continue;
    if(map.getLayoutProperty(id,'visibility')==='none')continue;
    const hits=map.queryRenderedFeatures(e.point,{layers:[id]});
    if(hits.length){openSheet(kind,hits[0].properties);return;}
  }
  sheet.classList.remove('open');
});
</script>
</body>
</html>
